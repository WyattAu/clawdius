# nginx reverse proxy configuration for Clawdius multi-tenant deployment
#
# Features:
#   - SSL termination (requires certificates in /etc/nginx/certs/)
#   - HTTP to HTTPS redirect
#   - WebSocket proxy for streaming endpoints
#   - Rate limiting per client IP
#   - Request size limits
#   - Security headers
#
# SSL Setup:
#   1. Obtain certificates (Let's Encrypt or custom CA)
#   2. Place cert.pem and key.pem in the nginx-certs volume
#   3. Uncomment the SSL server block below

# Rate limiting zone: 100 requests/second per client IP
limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

# Upstream Clawdius server
upstream clawdius_backend {
    server clawdius:8080;
    keepalive 32;
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name _;

    # SSL configuration (uncomment when certificates are available)
    # ssl_certificate     /etc/nginx/certs/cert.pem;
    # ssl_certificate_key /etc/nginx/certs/key.pem;
    # ssl_protocols       TLSv1.2 TLSv1.3;
    # ssl_ciphers         HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache   shared:SSL:10m;
    # ssl_session_timeout 10m;

    # If no SSL cert, serve HTTP on 443 (for development)
    # Remove this block when SSL is configured
    if ($scheme != "https") {
        return 301 http://$host$request_uri;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'" always;

    # Request body size limit (100MB for large codebases)
    client_max_body_size 100m;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Health endpoint (no rate limiting)
    location /api/v1/health {
        proxy_pass http://clawdius_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    # Metrics endpoint (internal only)
    location /metrics {
        proxy_pass http://clawdius_backend;
        proxy_set_header Host $host;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
    }

    # API endpoints with rate limiting
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://clawdius_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Connection upgrade for WebSocket/streaming
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Buffering off for streaming responses
        proxy_buffering off;
        proxy_cache off;
    }

    # Default: proxy everything else
    location / {
        proxy_pass http://clawdius_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
