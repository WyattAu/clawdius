# Clawdius Server Configuration
# Default configuration for self-hosted deployment

[server]
host = "0.0.0.0"
port = 3000
workers = 4
max_connections = 1000
request_timeout_ms = 30000

[llm]
# Default provider: anthropic, openai, ollama, zai, local
provider = "ollama"
model = "deepseek-coder:6.7b"

# Ollama configuration (for local LLMs)
[llm.ollama]
host = "http://ollama:11434"
timeout_ms = 60000
max_tokens = 4096
temperature = 0.7

# Alternative: OpenAI configuration
[llm.openai]
api_key_env = "OPENAI_API_KEY"
model = "gpt-4"
timeout_ms = 60000

# Alternative: Anthropic configuration
[llm.anthropic]
api_key_env = "ANTHROPIC_API_KEY"
model = "claude-3-5-sonnet-20241022"
timeout_ms = 60000

[session]
# Session management
max_sessions = 100
session_timeout_minutes = 60
auto_compact = true
compact_threshold = 0.8

[context]
# Context management
max_context_size = 100000
context_window = 128000
mention_prefix = "@"

[security]
# Security settings
enable_auth = false
jwt_secret_env = "CLAWDIUS_JWT_SECRET"
cors_origins = ["*"]
rate_limit_requests = 100
rate_limit_window_ms = 60000

[enterprise]
# Enterprise features
enable_sso = false
enable_audit = true
enable_teams = false

[enterprise.audit]
# Audit logging
storage = "sqlite"
retention_days = 90
log_level = "info"

[enterprise.sso]
# SSO configuration (when enabled)
provider = "oidc"
oidc_issuer = ""
oidc_client_id = ""
oidc_client_secret_env = "OIDC_CLIENT_SECRET"

[plugins]
# Plugin system
enabled = true
directory = "/app/plugins"
auto_load = true

[sandbox]
# Sandbox execution settings
default_backend = "filtered"
timeout_ms = 30000
max_memory_mb = 512
max_cpu_percent = 80

[logging]
# Logging configuration
level = "info"
format = "json"
file = "/app/logs/clawdius.log"
max_size_mb = 100
max_files = 5

[telemetry]
# Telemetry and metrics
enabled = true
prometheus_port = 9091
collect_metrics = true

[resources]
# Resource management
max_memory_mb = 2048
max_file_handles = 1024
cleanup_interval_seconds = 3600
connection_pool_size = 10

[cache]
# Caching configuration (Redis)
enabled = false
redis_url = "redis://redis:6379"
default_ttl_seconds = 3600
