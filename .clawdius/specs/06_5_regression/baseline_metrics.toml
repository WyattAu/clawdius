# ============================================================================
# REGRESSION THRESHOLDS BY COMPONENT
# ============================================================================

[thresholds.critical_hft]
description = "HFT critical path components"
warning_pct = 5.0
failure_pct = 20.0
block_merge = true
components = [
    "ring_buffer.push",
    "ring_buffer.pop",
    "ring_buffer.roundtrip",
    "wallet_guard.full_validation",
    "hft_pipeline.market_data_ingestion",
    "hft_pipeline.signal_generation",
    "hft_pipeline.full_pipeline",
]

[thresholds.boot]
description = "Boot and initialization"
warning_pct = 10.0
failure_pct = 50.0
block_merge = true
components = ["boot"]

[thresholds.standard]
description = "Standard performance components"
warning_pct = 10.0
failure_pct = 50.0
block_merge = false
components = [
    "fsm.phase_transition",
    "fsm.full_cycle",
    "sandbox.*",
    "wasm_rpc.*",
    "graph_rag.*",
    "tui.frame_render",
]

[thresholds.throughput]
description = "Throughput measurements"
warning_pct = -5.0      # Negative = throughput decrease is regression
failure_pct = -20.0
block_merge = true
