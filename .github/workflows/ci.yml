name: CI

on:
  push:
    branches: [main, master, develop]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1
  RUST_BACKTRACE: short
  NEXTEST_EXPERIMENTAL_DOUBLE_SPAWN: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          components: clippy, rustfmt
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: lint
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run clippy
        run: |
          cargo clippy --all-targets --all-features -- \
            -D warnings \
            -D clippy::all \
            -D clippy::pedantic \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::todo \
            -W clippy::nursery \
            -W clippy::cargo
      
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      
      - name: Check dependencies
        run: cargo deny check --all-features
      
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      
      - name: Check unused dependencies
        run: cargo machete

  test:
    name: Test (${{ matrix.rust }}, shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        rust: [stable, 1.85]
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: llvm-tools-preview
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ matrix.rust }}-${{ matrix.shard }}
      
      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked
      
      - name: Check compilation
        run: cargo check --all-targets --all-features
      
      - name: Build tests
        run: cargo nextest build --workspace --all-features
      
      - name: Run tests (shard ${{ matrix.shard }})
        run: |
          cargo nextest run --workspace --all-features \
            --profile ci \
            --shard ${{ matrix.shard }}/4 \
            --reporter junit:target/nextest/junit-${{ matrix.shard }}.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.rust }}-${{ matrix.shard }}
          path: target/nextest/
          retention-days: 30

  test-merge:
    name: Test Results
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check test status
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Tests failed"
            exit 1
          fi
          echo "All tests passed"

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: mutants
      
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      
      - name: Run mutation tests
        run: |
          cargo mutants \
            --workspace \
            --in-place \
            --timeout-seconds 300 \
            --max-test-duration-seconds 60 \
            --minimum-test-coverage 85 \
            || { echo "::error::Mutation score below threshold 85%"; exit 1; }

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          components: llvm-tools-preview
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      
      - name: Generate coverage report
        run: |
          cargo llvm-cov --workspace --all-features \
            --lcov --output-path lcov.info \
            --ignore-filename-regex "(tests|benches|examples)/"
      
      - name: Check coverage thresholds
        run: |
          COVERAGE=$(cargo llvm-cov --workspace --all-features --summary-only 2>&1 | grep -oP '\d+\.\d+%' | head -1 | tr -d '%')
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 85.0" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below threshold 85%"
            exit 1
          fi
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: true
          threshold: 1%
      
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            lcov.info
            target/llvm-cov/
          retention-days: 30

  vscode-extension:
    name: VSCode Extension
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: editors/vscode/package-lock.json
      
      - name: Install dependencies
        working-directory: editors/vscode
        run: npm ci
      
      - name: Compile TypeScript
        working-directory: editors/vscode
        run: npm run compile
      
      - name: Run linter
        working-directory: editors/vscode
        run: npm run lint
      
      - name: Package extension
        working-directory: editors/vscode
        run: |
          npm install -g @vscode/vsce
          vsce package --out clawdius-code.vsix
      
      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: editors/vscode/clawdius-code.vsix
          retention-days: 30

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: security
      
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      
      - name: Run cargo audit
        run: cargo audit
      
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      
      - name: Check advisories (CVEs)
        run: cargo deny check advisories
      
      - name: Check licenses
        run: cargo deny check licenses
      
      - name: Check bans (duplicates)
        run: cargo deny check bans
      
      - name: Check sources
        run: cargo deny check sources

  sanitizer:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    env:
      RUSTFLAGS: "-Z sanitizer=address"
      ASAN_OPTIONS: "detect_leaks=1:detect_stack_use_after_return=1"
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: llvm-tools-preview
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: sanitizer
      
      - name: Run tests with AddressSanitizer
        run: |
          cargo test --workspace --target x86_64-unknown-linux-gnu \
            -- --nocapture 2>&1 | tee asan-output.txt
          if grep -q "ERROR: AddressSanitizer" asan-output.txt; then
            echo "::error::AddressSanitizer detected memory issues"
            exit 1
          fi
          echo "✅ No AddressSanitizer issues detected"

  benchmarks:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: benchmarks
      
      - name: Cache previous benchmark results
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: criterion-baseline-${{ github.sha }}
          restore-keys: |
            criterion-baseline-
      
      - name: Run benchmarks
        run: |
          cargo bench --workspace -- --save-baseline current 2>&1 | tee benchmark-results.txt
      
      - name: Check for benchmark regressions
        run: |
          if cargo bench --workspace -- --baseline current 2>&1 | grep -q "performance has regressed"; then
            echo "::warning::Performance regression detected in benchmarks"
          else
            echo "✅ No performance regressions detected"
          fi
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: |
            target/criterion/
            benchmark-results.txt
          retention-days: 30

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly
          components: llvm-tools-preview
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: fuzz
      
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      
      - name: Build fuzz targets
        run: cargo fuzz build
      
      - name: Run fuzz_parser (60s)
        run: timeout 60s cargo fuzz run fuzz_parser -- -max_total_time=55 || true
      
      - name: Run fuzz_config (60s)
        run: timeout 60s cargo fuzz run fuzz_config -- -max_total_time=55 || true
      
      - name: Run fuzz_rpc (60s)
        run: timeout 60s cargo fuzz run fuzz_rpc -- -max_total_time=55 || true
      
      - name: Run fuzz_mention (60s)
        run: timeout 60s cargo fuzz run fuzz_mention -- -max_total_time=55 || true
      
      - name: Run fuzz_diff_engine (60s)
        run: timeout 60s cargo fuzz run fuzz_diff_engine -- -max_total_time=55 || true
      
      - name: Check for crash artifacts
        run: |
          if ls fuzz/artifacts/*/crash-* 2>/dev/null; then
            echo "::error::Fuzzing found crashes!"
            exit 1
          fi
          echo "No crashes found"

  proofs:
    name: Formal Verification (Lean4)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Lean4
        uses: leanprover/lean4-action@v2
        with:
          toolchain: stable
          elan-version: 3.1.1
      
      - name: Check Lean4 availability
        run: lean --version
      
      - name: Compile Lean4 proofs
        run: |
          cd .clawdius/specs/02_architecture/proofs
          echo "=== Compiling formal verification proofs ==="
          FAILED=0
          for f in *.lean; do
            echo "Compiling $f..."
            if ! lean "$f" 2>&1; then
              echo "::error::$f failed to compile"
              FAILED=1
            fi
          done
          if [ $FAILED -eq 1 ]; then
            echo "::error::One or more Lean4 proofs failed to compile"
            exit 1
          fi
          echo "=== All Lean4 proofs compiled successfully ==="

      - name: Check sorry count
        run: |
          cd .clawdius/specs/02_architecture/proofs
          SORRY_COUNT=$(grep -r "^  sorry$" *.lean 2>/dev/null | wc -l || echo 0)
          echo "Sorry count: ${SORRY_COUNT}"
          if [ "$SORRY_COUNT" -gt 0 ]; then
            echo "::error::Sorry count ${SORRY_COUNT} exceeds threshold of 0. All theorems must be proven."
            exit 1
          fi
          echo "✅ Sorry count within threshold (0 — all theorems proven)"

      - name: Check axiom count
        run: |
          cd .clawdius/specs/02_architecture/proofs
          AXIOM_COUNT=$(grep -r "^axiom " *.lean 2>/dev/null | wc -l || echo 0)
          echo "Axiom count: ${AXIOM_COUNT}"
          if [ "$AXIOM_COUNT" -gt 39 ]; then
            echo "::error::Axiom count ${AXIOM_COUNT} exceeds threshold of 39. Reduce axioms before merging."
            exit 1
          fi
          echo "✅ Axiom count within threshold (≤39)"

  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: [test]
    if: "!startsWith(github.ref, 'refs/tags/')"
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          targets: ${{ matrix.target }}
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.target }}
      
      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      
      - name: Build release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p clawdius
          cargo build --release --target ${{ matrix.target }} -p clawdius-code
      
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawdius-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/clawdius
            target/${{ matrix.target }}/release/clawdius-code
            target/${{ matrix.target }}/release/clawdius.exe
            target/${{ matrix.target }}/release/clawdius-code.exe
            !target/${{ matrix.target }}/release/*.d
            !target/${{ matrix.target }}/release/*.rlib
          retention-days: 30
          if-no-files-found: warn

  release:
    name: Release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    needs: [test, vscode-extension]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          targets: ${{ matrix.target }}
      
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
      
      - name: Install musl tools (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
      
      - name: Build release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p clawdius
          cargo build --release --target ${{ matrix.target }} -p clawdius-code
        env:
          RUSTFLAGS: "-C target-cpu=native -C lto=fat -C codegen-units=1"
      
      - name: Create archive (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ARCHIVE="clawdius-${VERSION}-${{ matrix.target }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar -czvf ../../../${ARCHIVE} clawdius clawdius-code
          cd ../../../
          sha256sum ${ARCHIVE} > ${ARCHIVE}.sha256
      
      - name: Create archive (Windows)
        if: matrix.archive == 'zip'
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          ARCHIVE="clawdius-${VERSION}-${{ matrix.target }}.zip"
          cd target/${{ matrix.target }}/release
          7z a ../../../${ARCHIVE} clawdius.exe clawdius-code.exe
          cd ../../../
          sha256sum ${ARCHIVE} > ${ARCHIVE}.sha256
        shell: bash
      
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            clawdius-*.tar.gz
            clawdius-*.tar.gz.sha256
            clawdius-*.zip
            clawdius-*.zip.sha256
          retention-days: 90

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [release, vscode-extension]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release-assets/ \;
          find artifacts/ -type f -name "*.vsix" -exec cp {} release-assets/ \;
      
      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          sed -n "/## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1 > release-notes.md || echo "Release v${VERSION}" > release-notes.md
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat release-notes.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Clawdius ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          files: release-assets/*
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, coverage, vscode-extension, security, sanitizer, benchmarks, fuzz, proofs]
    if: always() && !startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Evaluate quality gate
        run: |
          echo "=== Quality Gate Evaluation ==="
          echo ""
          
          FAILED=0
          
          if [ "${{ needs.lint.result }}" == "success" ]; then
            echo "✅ Lint: PASSED"
          else
            echo "❌ Lint: FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ Tests: PASSED"
          else
            echo "❌ Tests: FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.coverage.result }}" == "success" ]; then
            echo "✅ Coverage: PASSED (≥85%)"
          else
            echo "❌ Coverage: FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.vscode-extension.result }}" == "success" ]; then
            echo "✅ VSCode Extension: PASSED"
          else
            echo "❌ VSCode Extension: FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.security.result }}" == "success" ]; then
            echo "✅ Security: PASSED"
          else
            echo "❌ Security: FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.sanitizer.result }}" == "success" ]; then
            echo "✅ AddressSanitizer: PASSED"
          elif [ "${{ needs.sanitizer.result }}" == "skipped" ]; then
            echo "⚠️ AddressSanitizer: SKIPPED"
          else
            echo "❌ AddressSanitizer: FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.benchmarks.result }}" == "success" ]; then
            echo "✅ Benchmarks: PASSED"
          elif [ "${{ needs.benchmarks.result }}" == "skipped" ]; then
            echo "⚠️ Benchmarks: SKIPPED"
          else
            echo "❌ Benchmarks: FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.fuzz.result }}" == "success" ]; then
            echo "✅ Fuzz Testing: PASSED"
          elif [ "${{ needs.fuzz.result }}" == "skipped" ]; then
            echo "⚠️ Fuzz Testing: SKIPPED"
          else
            echo "❌ Fuzz Testing: FAILED"
            FAILED=1
          fi
          
          if [ "${{ needs.proofs.result }}" == "success" ]; then
            echo "✅ Formal Proofs: PASSED (sorry = 0, axioms ≤39)"
          elif [ "${{ needs.proofs.result }}" == "skipped" ]; then
            echo "⚠️ Formal Proofs: SKIPPED"
          else
            echo "❌ Formal Proofs: FAILED"
            FAILED=1
          fi
          
          echo ""
          if [ $FAILED -eq 1 ]; then
            echo "=== Quality Gate FAILED ==="
            exit 1
          fi
          echo "=== All Quality Gates PASSED ==="
