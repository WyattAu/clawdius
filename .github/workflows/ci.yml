name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1
  RUST_BACKTRACE: short
  NEXTEST_EXPERIMENTAL_DOUBLE_SPAWN: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
      
      - name: Check formatting
        run: cargo fmt --all -- --check
      
      - name: Run clippy
        run: |
          cargo clippy --all-targets --all-features -- \
            -D warnings \
            -D clippy::all \
            -D clippy::pedantic \
            -D clippy::unwrap_used \
            -D clippy::expect_used \
            -D clippy::panic \
            -D clippy::todo \
            -W clippy::nursery \
            -W clippy::cargo
      
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      
      - name: Check dependencies
        run: cargo deny check --all-features
      
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      
      - name: Check unused dependencies
        run: cargo machete

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      
      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked
      
      - name: Build tests
        run: cargo nextest build --all-features
      
      - name: Run tests (shard ${{ matrix.shard }})
        run: |
          cargo nextest run --all-features \
            --profile ci \
            --shard ${{ matrix.shard }}/4 \
            --reporter junit:target/nextest/junit-${{ matrix.shard }}.xml
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.shard }}
          path: target/nextest/
          retention-days: 30

  test-merge:
    name: Test Results
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Check test status
        run: |
          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "Tests failed"
            exit 1
          fi
          echo "All tests passed"

  mutation:
    name: Mutation Testing
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: lint
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-mutants-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-mutants-
      
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      
      - name: Run mutation tests
        run: |
          cargo mutants \
            --in-place \
            --timeout-seconds 300 \
            --max-test-duration-seconds 60 \
            --minimum-test-coverage 85 \
            || echo "::warning::Mutation score below threshold"

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-cov-
      
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      
      - name: Generate coverage report
        run: |
          cargo llvm-cov --all-features \
            --lcov --output-path lcov.info \
            --ignore-filename-regex "(tests|benches|examples)/"
      
      - name: Check coverage thresholds
        run: |
          COVERAGE=$(cargo llvm-cov --all-features --summary-only 2>&1 | grep -oP '\d+\.\d+%' | head -1 | tr -d '%')
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 85.0" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below threshold 85%"
            exit 1
          fi
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: true
          threshold: 1%
      
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            lcov.info
            target/llvm-cov/
          retention-days: 30

  lean4:
    name: Lean4 Verification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Lean4
        uses: leanprover/lean-action@v1
        with:
          lake-package-directory: lean
      
      - name: Cache Lean4 build
        uses: actions/cache@v4
        with:
          path: lean/.lake
          key: ${{ runner.os }}-lean-${{ hashFiles('lean/lakefile.lean', 'lean-toolchain') }}
          restore-keys: |
            ${{ runner.os }}-lean-
      
      - name: Build Lean4 proofs
        working-directory: lean
        run: lake build
      
      - name: Check for sorry
        working-directory: lean
        run: |
          if grep -rq "sorry" .; then
            echo "::warning::Found 'sorry' in proofs - incomplete verification"
          fi

  build:
    name: Build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    needs: [test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-build-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-${{ matrix.target }}-
      
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: clawdius-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/clawdius
          retention-days: 30

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [lint, test, coverage]
    if: always()
    steps:
      - name: Evaluate quality gate
        run: |
          echo "=== Quality Gate Evaluation ==="
          echo ""
          
          # Check lint
          if [ "${{ needs.lint.result }}" == "success" ]; then
            echo "✅ Lint: PASSED"
          else
            echo "❌ Lint: FAILED"
            exit 1
          fi
          
          # Check tests
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ Tests: PASSED"
          else
            echo "❌ Tests: FAILED"
            exit 1
          fi
          
          # Check coverage
          if [ "${{ needs.coverage.result }}" == "success" ]; then
            echo "✅ Coverage: PASSED"
          else
            echo "❌ Coverage: FAILED"
            exit 1
          fi
          
          echo ""
          echo "=== All Quality Gates PASSED ==="
