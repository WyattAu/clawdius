name: Benchmarks

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

# Performance SLOs (documented, not enforced in CI yet):
#   - Ring buffer ops: <100ns
#   - Wallet guard: <100us
#   - HFT pipeline: <1ms
#   - Messaging routing: <1ms P99

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: bench

      - name: Cache criterion data
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: ${{ runner.os }}-criterion-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-criterion-main
            ${{ runner.os }}-criterion-

      - name: Run benchmarks
        run: |
          cargo bench --workspace -- --save-baseline ${{ github.sha }} noplot

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: target/criterion
          retention-days: 30

  regression-check:
    name: Regression Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: benchmark
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: bench-regression

      - name: Cache criterion data
        uses: actions/cache@v4
        with:
          path: target/criterion
          key: ${{ runner.os }}-criterion-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-criterion-main
            ${{ runner.os }}-criterion-

      - name: Download benchmark results from benchmark job
        uses: actions/download-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: target/criterion

      - name: Fetch main branch for baseline comparison
        run: git fetch origin main

      - name: Run regression comparison
        id: regression
        run: |
          REGRESSION_OUTPUT=$(mktemp)
          if cargo bench --workspace -- --baseline main 2>&1 | tee "$REGRESSION_OUTPUT"; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "No performance regression detected"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "Performance regression detected!"
            exit 1
          fi

      - name: Extract regression summary
        if: always()
        id: summary
        run: |
          {
            echo "body<<COMMENT_EOF"
            echo "## Benchmark Results"
            echo ""
            echo "**Commit:** \`${{ github.sha }}\`"
            echo "**Branch:** \`${{ github.head_ref }}\` -> \`${{ github.base_ref }}\`"
            echo "**Status:** ${{ steps.regression.outputs.result == 'pass' && '✅ Passed' || '❌ Regression detected' }}"
            echo ""
            echo "Regression threshold: **>15%** slowdown"
            echo ""
            echo "Benchmarks compared against \`main\` branch baseline using criterion."
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.summary.outputs.body }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
