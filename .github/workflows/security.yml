name: Security

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      
      - name: Run security audit
        run: |
          cargo audit \
            --deny warnings \
            --deny unmaintained \
            --deny yanked
      
      - name: Generate audit report
        if: always()
        run: cargo audit --format json > audit-report.json || true
      
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-report
          path: audit-report.json
          retention-days: 90

  deny:
    name: Dependency Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      
      - name: Check advisories (CVEs)
        run: cargo deny check advisories
      
      - name: Check licenses
        run: cargo deny check licenses
      
      - name: Check bans (duplicates)
        run: cargo deny check bans
      
      - name: Check sources
        run: cargo deny check sources

  vet:
    name: Supply Chain Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked
      
      - name: Check vet status
        run: cargo vet --locked
      
      - name: Suggest additional audits
        if: always()
        run: cargo vet suggest --locked || true

  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Detect secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  sast:
    name: Static Analysis (SAST)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v3
        with:
          languages: rust
      
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"

  fuzz:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: true
    strategy:
      matrix:
        target:
          - fuzz_parser
          - fuzz_config
          - fuzz_rpc
          - fuzz_mention
          - fuzz_diff_engine
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            fuzz/target
            fuzz/corpus
          key: ${{ runner.os }}-fuzz-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-fuzz-${{ matrix.target }}-
      
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      
      - name: Run fuzzer (2 minutes)
        run: |
          cd fuzz
          cargo fuzz run ${{ matrix.target }} \
            -- \
            -max_total_time=120 \
            -max_len=4096 \
            -rss_limit_mb=2048
      
      - name: Check for crashes
        run: |
          if ls fuzz/artifacts/*/crashes/* 2>/dev/null; then
            echo "::error::Fuzzer found crashes"
            exit 1
          fi
          echo "No crashes found"

  security-tests:
    name: Security Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [audit, deny]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      
      - name: Install cargo-nextest
        run: cargo install cargo-nextest --locked
      
      - name: Run security tests
        run: |
          cargo nextest run \
            --workspace --all-features \
            -E 'test(security)'
      
      - name: Run input validation tests
        run: |
          cargo nextest run \
            --workspace --all-features \
            -E 'test(input_validation)'
      
      - name: Run sandbox escape tests
        run: |
          cargo nextest run \
            --workspace --all-features \
            -E 'test(sandbox_escape)'

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [audit, deny]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      
      - name: Generate SBOM
        run: cargo cyclonedx --workspace --all-features --format json
      
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: target/*.json
          retention-days: 90

  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [audit, deny, secrets, sast, security-tests, fuzz]
    if: always()
    steps:
      - name: Evaluate security gate
        run: |
          echo "=== Security Gate Evaluation ==="
          echo ""
          
          FAILED=0
          
          # Check audit
          if [ "${{ needs.audit.result }}" == "success" ]; then
            echo "✅ Dependency Audit: PASSED"
          else
            echo "❌ Dependency Audit: FAILED"
            FAILED=1
          fi
          
          # Check deny
          if [ "${{ needs.deny.result }}" == "success" ]; then
            echo "✅ Dependency Lint: PASSED"
          else
            echo "❌ Dependency Lint: FAILED"
            FAILED=1
          fi
          
          # Check secrets
          if [ "${{ needs.secrets.result }}" == "success" ]; then
            echo "✅ Secret Detection: PASSED"
          else
            echo "❌ Secret Detection: FAILED"
            FAILED=1
          fi
          
          # Check SAST
          if [ "${{ needs.sast.result }}" == "success" ]; then
            echo "✅ SAST: PASSED"
          else
            echo "❌ SAST: FAILED"
            FAILED=1
          fi
          
          # Check security tests
          if [ "${{ needs.security-tests.result }}" == "success" ]; then
            echo "✅ Security Tests: PASSED"
          else
            echo "❌ Security Tests: FAILED"
            FAILED=1
          fi
          
          # Check fuzz
          if [ "${{ needs.fuzz.result }}" == "success" ]; then
            echo "✅ Fuzz Testing: PASSED"
          elif [ "${{ needs.fuzz.result }}" == "skipped" ]; then
            echo "⚠️ Fuzz Testing: SKIPPED"
          else
            echo "❌ Fuzz Testing: FAILED"
            FAILED=1
          fi
          
          echo ""
          if [ $FAILED -eq 1 ]; then
            echo "=== Security Gate FAILED ==="
            exit 1
          fi
          echo "=== Security Gate PASSED ==="
