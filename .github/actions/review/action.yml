name: 'Clawdius Code Review'
description: 'Run AI-powered code review with Clawdius'
author: 'Clawdius Team'

branding:
  icon: 'code'
  color: 'purple'

inputs:
  github-token:
    description: 'GitHub token for API access'
    required: true
  anthropic-api-key:
    description: 'Anthropic API key for Claude'
    required: true
  config-path:
    description: 'Path to .clawdius/config.toml'
    required: false
    default: '.clawdius'
  review-scope:
    description: 'Review scope: changed-files, full-repo, or specific paths (comma-separated)'
    required: false
    default: 'changed-files'
  output-format:
    description: 'Output format: comment, check, or artifact'
    required: false
    default: 'comment'
  fail-on-issues:
    description: 'Fail the workflow if issues are found'
    required: false
    default: 'false'
  rust-toolchain:
    description: 'Rust toolchain version to use'
    required: false
    default: 'stable'
  cache-key:
    description: 'Custom cache key prefix'
    required: false
    default: 'clawdius'

outputs:
  issues-found:
    description: 'Number of issues found during review'
    value: ${{ steps.review.outputs.issues-found }}
  review-status:
    description: 'Review completion status'
    value: ${{ steps.review.outputs.review-status }}
  report-path:
    description: 'Path to the generated report'
    value: ${{ steps.review.outputs.report-path }}

runs:
  using: 'composite'
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ inputs.cache-key }}-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ inputs.cache-hash }}-${{ runner.os }}-cargo-

    - name: Cache Clawdius binary
      id: cache-clawdius
      uses: actions/cache@v4
      with:
        path: ~/.cargo/bin/clawdius
        key: ${{ inputs.cache-key }}-${{ runner.os }}-binary-${{ hashFiles('**/Cargo.lock') }}

    - name: Install Clawdius
      if: steps.cache-clawdius.outputs.cache-hit != 'true'
      shell: bash
      run: cargo install --path .

    - name: Get changed files
      if: inputs.review-scope == 'changed-files'
      id: changed-files
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          FILES=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files --jq '.[].filename' | tr '\n' ' ')
          echo "files=${FILES}" >> $GITHUB_OUTPUT
        else
          echo "files=" >> $GITHUB_OUTPUT
        fi

    - name: Create output directory
      shell: bash
      run: mkdir -p review-output

    - name: Run Clawdius review
      id: review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set +e
        
        REVIEW_ARGS=""
        
        if [ "${{ inputs.review-scope }}" = "changed-files" ]; then
          FILES="${{ steps.changed-files.outputs.files }}"
          if [ -n "$FILES" ]; then
            REVIEW_ARGS="--files $FILES"
          else
            echo "No changed files detected"
            echo "issues-found=0" >> $GITHUB_OUTPUT
            echo "review-status=skipped" >> $GITHUB_OUTPUT
            exit 0
          fi
        elif [ "${{ inputs.review-scope }}" != "full-repo" ]; then
          REVIEW_ARGS="--paths ${{ inputs.review-scope }}"
        fi
        
        clawdius review \
          --config "${{ inputs.config-path }}" \
          --output review-output/report.md \
          --format markdown \
          $REVIEW_ARGS \
          2>&1 | tee review-output/review.log
        
        EXIT_CODE=${PIPESTATUS[0]}
        
        ISSUES=$(grep -c "Issue:" review-output/report.md || echo "0")
        
        echo "issues-found=${ISSUES}" >> $GITHUB_OUTPUT
        echo "report-path=review-output/report.md" >> $GITHUB_OUTPUT
        
        if [ $EXIT_CODE -eq 0 ]; then
          echo "review-status=success" >> $GITHUB_OUTPUT
        else
          echo "review-status=failed" >> $GITHUB_OUTPUT
        fi
        
        if [ "${{ inputs.fail-on-issues }}" = "true" ] && [ "$ISSUES" -gt 0 ]; then
          echo "::error::Found ${ISSUES} issues during review"
          exit 1
        fi
        
        exit $EXIT_CODE

    - name: Create PR comment
      if: inputs.output-format == 'comment' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          
          try {
            const report = fs.readFileSync('review-output/report.md', 'utf8');
            
            const body = `## 🔍 Clawdius Code Review
          
          ${report}
          
          ---
          <details>
          <summary>Review Details</summary>
          
          - **Issues Found:** ${{ steps.review.outputs.issues-found }}
          - **Review Scope:** ${{ inputs.review-scope }}
          - **Status:** ${{ steps.review.outputs.review-status }}
          </details>`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body
            });
          } catch (error) {
            console.log('Error creating comment:', error);
          }

    - name: Create GitHub Check
      if: inputs.output-format == 'check'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          
          try {
            const report = fs.readFileSync('review-output/report.md', 'utf8');
            const issuesFound = parseInt('${{ steps.review.outputs.issues-found }}');
            
            await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Clawdius Code Review',
              head_sha: context.sha,
              status: 'completed',
              conclusion: issuesFound > 0 ? 'failure' : 'success',
              output: {
                title: issuesFound > 0 ? `Found ${issuesFound} issues` : 'No issues found',
                summary: report,
                annotations: []
              }
            });
          } catch (error) {
            console.log('Error creating check:', error);
          }

    - name: Upload review artifact
      if: inputs.output-format == 'artifact' || always()
      uses: actions/upload-artifact@v4
      with:
        name: clawdius-review-report
        path: review-output/
        retention-days: 30

    - name: Review summary
      if: always()
      shell: bash
      run: |
        echo "## Clawdius Code Review Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Issues Found:** ${{ steps.review.outputs.issues-found }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Review Status:** ${{ steps.review.outputs.review-status }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Review Scope:** ${{ inputs.review-scope }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Output Format:** ${{ inputs.output-format }}" >> $GITHUB_STEP_SUMMARY
        
        if [ -f review-output/report.md ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Review Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          cat review-output/report.md >> $GITHUB_STEP_SUMMARY
        fi
