name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: |
          cargo clippy -p clawdius-core -p clawdius-server -- \
            -D warnings \
            -D clippy::unwrap_used \
            -D clippy::expect_used

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          key: test

      - name: Run messaging tests
        run: cargo test -p clawdius-core --lib messaging

      - name: Run channels HTTP tests
        run: cargo test -p clawdius-core --test channels_http_tests

      - name: Run messaging integration tests
        run: cargo test -p clawdius-core --test messaging_integration_tests

      - name: Run server tests
        run: cargo test -p clawdius-server

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t clawdius-server .

      - name: Verify binary works
        run: docker run --rm clawdius-server --help

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || true

      - name: Run cargo audit
        run: cargo audit --deny warnings || true
