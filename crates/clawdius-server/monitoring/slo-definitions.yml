# Clawdius Messaging Gateway — SLO Definitions
#
# Service Level Objectives for the messaging gateway SaaS product.
# These define the reliability targets that drive alerting thresholds,
# capacity planning, and incident response priorities.
#
# Review cycle: Monthly
# Last reviewed: 2026-03-29

# =============================================================================
# SLO 1: Availability
# =============================================================================
#
# Definition: The messaging gateway accepts and processes webhook requests.
# Measurement: HTTP 5xx error rate on webhook endpoints.
#
# Target: 99.9% availability (43.8 minutes downtime/month)
# Error budget: 0.1% of requests in a 30-day window

slo:
  - name: clawdius_availability
    description: "Messaging gateway accepts webhook requests"
    target: "99.9"
    window: 30d
    indicator:
      type: availability
      metric: |
        sum(rate(clawdius_http_requests_total{route=~"/webhook/.*",status=~"5.."}[5m]))
        / sum(rate(clawdius_http_requests_total{route=~"/webhook/.*"}[5m]))
      threshold: 0.001  # 0.1% error budget
    alerting:
      burn_rate_threshold: 2.0
      # Page if 2x error budget consumed in 1 hour
      short_window: 1h
      short_burn_rate: 14.4  # 30-day budget in 1 hour = 720x, page at 2% = 14.4x
      # Ticket if 2x error budget consumed in 6 hours
      long_window: 6h
      long_burn_rate: 2.4   # 30-day budget in 6 hours = 120x, ticket at 2% = 2.4x

# =============================================================================
# SLO 2: Message Processing Latency
# =============================================================================
#
# Definition: A message is processed (parsed, handler invoked, response sent)
# within the latency target.
# Measurement: P99 of clawdius_usage_message_duration_ms for successful messages.
#
# Target: P99 < 2 seconds
# This ensures 99% of messages are processed within 2 seconds.

  - name: clawdius_message_latency_p99
    description: "P99 message processing latency"
    target: "99"
    window: 30d
    indicator:
      type: latency
      metric: |
        histogram_quantile(0.99,
          sum(rate(clawdius_usage_message_duration_ms_bucket{outcome="success"}[5m])) by (le)
        )
      threshold: 2000  # ms
    alerting:
      page_threshold: 5000   # Page if P99 > 5s
      warn_threshold: 3000   # Warn if P99 > 3s

# =============================================================================
# SLO 3: Message Delivery Reliability
# =============================================================================
#
# Definition: A message is successfully processed (outcome=success) on first attempt.
# Measurement: success rate of clawdius_usage_messages_total.
#
# Target: 99.5% first-attempt success rate
# This means fewer than 0.5% of messages fail on first processing attempt.

  - name: clawdius_message_success_rate
    description: "First-attempt message processing success rate"
    target: "99.5"
    window: 30d
    indicator:
      type: availability
      metric: |
        sum(rate(clawdius_usage_messages_total{outcome="success"}[5m]))
        / sum(rate(clawdius_usage_messages_total[5m]))
      threshold: 0.005  # 0.5% error budget
    alerting:
      burn_rate_threshold: 2.0
      short_window: 1h
      short_burn_rate: 14.4
      long_window: 6h
      long_burn_rate: 2.4

# =============================================================================
# SLO 4: Webhook Response Time
# =============================================================================
#
# Definition: The gateway responds to platform webhook callbacks quickly enough
# to avoid platform timeouts (most platforms timeout at 5-10 seconds).
# Measurement: P95 of clawdius_http_request_duration_ms on /webhook/* routes.
#
# Target: P95 < 1 second

  - name: clawdius_webhook_response_p95
    description: "P95 webhook HTTP response latency"
    target: "95"
    window: 30d
    indicator:
      type: latency
      metric: |
        histogram_quantile(0.95,
          sum(rate(clawdius_http_request_duration_ms_bucket{route=~"/webhook/.*"}[5m])) by (le)
        )
      threshold: 1000  # ms
    alerting:
      page_threshold: 3000   # Page if P95 > 3s
      warn_threshold: 1500   # Warn if P95 > 1.5s

# =============================================================================
# Error Budget Policy
# =============================================================================
#
# When error budget remaining falls below thresholds:
#
# | Budget Remaining | Action |
# |------------------|--------|
# | > 50%            | Normal operations |
# | 10% - 50%        | Freeze non-critical deploys; prioritize reliability work |
# | < 10%            | All-hands on reliability; no feature deploys |
# | 0%              | Incident; post-mortem required |
#
# Budget consumption rate alerts are configured in prometheus-alerts.yml
# using multi-window multi-burn-rate alerting.

# =============================================================================
# Capacity Planning Signals
# =============================================================================
#
# The following metrics inform capacity decisions (not SLO violations):
#
# - clawdius_usage_active_tenants > 200: Consider horizontal scaling
# - clawdius_messaging_active_sessions > 800: Review session TTL or scale
# - clawdius_messaging_retry_queue_pending > 500: Investigate delivery failures
# - clawdius_http_active_requests > 500: Consider connection pooling tuning
