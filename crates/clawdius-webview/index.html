<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clawdius Chat</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <script type="module">
        // Mock VSCode API for development
        window.acquireVsCodeApi = () => ({
            postMessage: (msg) => {
                console.log('Mock VSCode message:', msg);
                // Simulate response after 1 second
                setTimeout(() => {
                    window.postMessage({
                        type: 'response',
                        data: {
                            content: 'This is a mock response from Clawdius!'
                        }
                    }, '*');
                }, 1000);
            }
        });

        // Import WASM module
        import init from './pkg/clawdius_webview.js';
        init().catch(console.error);
    </script>
</body>
</html>
