[[test_vector]]
id = "TV-HFT-007"
name = "Zero quantity rejection"
category = "adversarial"
priority = "medium"
description = "Order with zero quantity should be rejected"

[test_vector.input]
quantity = { type = "u64", value = 0 }

[test_vector.expected_output]
decision = { type = "string", value = "rejected" }
reason = { type = "string", value = "order_size_exceeded" }

[[test_vector]]
id = "TV-HFT-008"
name = "Daily drawdown exceeded"
category = "boundary"
priority = "critical"
description = "Order rejected when daily drawdown limit exceeded"

[test_vector.input]
