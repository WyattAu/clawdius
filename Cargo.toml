[package]
name = "clawdius"
version = "0.1.0"
edition = "2024"

[dependencies]
async-openai = "0.33.0"
crossterm = "0.29.0"
genai = "0.5.3"
keyring = "3.6.3"
lancedb = "0.26.2"
ratatui = "0.30.0"
