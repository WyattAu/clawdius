services:
  clawdius:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clawdius-server
    ports:
      - "8080:8080"
    volumes:
      - clawdius-data:/app/data
      - ./clawdius.toml:/app/clawdius.toml:ro
    environment:
      - RUST_LOG=info
      - CLAWDIUS_JSON_LOGS=true
      - CLAWDIUS_DB_PATH=/app/data/sessions.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  clawdius-data:
    driver: local
