[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
# These are informational warnings about unmaintained crates, not vulnerabilities
# They are documented in VERSION.md
ignore = [
    # Unmaintained crates (not vulnerabilities)
    "RUSTSEC-2025-0141", # bincode via syntect
    "RUSTSEC-2025-0057", # fxhash via monoio
    "RUSTSEC-2024-0436", # paste (widespread transitive)
    "RUSTSEC-2024-0370", # proc-macro-error via leptos
    "RUSTSEC-2024-0320", # yaml-rust via syntect
    "RUSTSEC-2025-0052", # async-std via httpmock (dev dependency, transitive)
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MPL-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "CC0-1.0",
    "OFL-1.1",
    "OpenSSL",
    "0BSD",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
]
confidence-threshold = 0.8
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []
skip = [
    { name = "winnow", version = "0.7" },
    { name = "toml", version = "0.8" },
]
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
